<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ultradian — Your Time to Focus</title>
<style>
  :root{
    --bg:#0b0b0c;           /* deep monochrome background */
    --card:#0f1113;         /* card surface */
    --ink:#e6eefc;          /* primary text */
    --muted:#9aa6c7;        /* secondary text */
    --accent:#6f8bff;       /* single calm accent */
    --glass: rgba(255,255,255,0.03);
    --radius:28px;
    --soft-shadow: 0 18px 40px rgba(2,6,23,0.6);
    --ring: rgba(111,139,255,0.12);
  }
  :root[data-theme="light"]{
    --bg:#f5f7fb;
    --card:#ffffff;
    --ink:#0f1724;
    --muted:#6b7280;
    --accent:#3a5fcd;
    --glass: rgba(255,255,255,0.6);
    --soft-shadow: 0 18px 40px rgba(15,23,42,0.06);
    --ring: rgba(58,95,205,0.12);
  }

  /* base */
  *{box-sizing:border-box;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;}
  html,body{height:100%;margin:0;background:radial-gradient(circle at 10% 10%, rgba(111,139,255,0.04), var(--bg) 40%);color:var(--ink);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:520px;margin:0 auto;padding:18px;min-height:100vh;display:flex;flex-direction:column;gap:14px;}

  /* splash */
  .splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,transparent,rgba(0,0,0,0.12));z-index:60}
  .splash-card{width:88%;max-width:420px;padding:26px;border-radius:20px;background:linear-gradient(180deg,var(--card),rgba(0,0,0,0.02));box-shadow:var(--soft-shadow);display:flex;flex-direction:column;align-items:center;gap:12px}
  .logo{width:84px;height:84px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(from 180deg at 50% 50%, rgba(255,255,255,0.06), var(--accent));animation:logoPulse 3.6s ease-in-out infinite}
  @keyframes logoPulse{0%{transform:scale(0.98)}50%{transform:scale(1.03)}100%{transform:scale(0.98)}}
  .enter{margin-top:6px;padding:10px 18px;border-radius:999px;border:none;background:linear-gradient(180deg,var(--accent),color-mix(in srgb, var(--accent) 70%, black 10%));color:#fff;font-weight:700;cursor:pointer}

  /* header */
  .header{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;flex-direction:column}
  .brand h1{margin:0;font-size:1.05rem;letter-spacing:0.01em}
  .brand p{margin:0;font-size:0.78rem;color:var(--muted)}

  .top-actions{display:flex;gap:10px;align-items:center}
  .icon-btn{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;border:none;background:var(--card);box-shadow:var(--soft-shadow);cursor:pointer;color:var(--ink);font-weight:700}

  /* presets card */
  .card{background:var(--card);border-radius:18px;padding:12px;border:1px solid rgba(255,255,255,0.02);box-shadow:var(--soft-shadow)}
  .presets{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
  .preset{padding:12px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));cursor:pointer;border:1px solid rgba(255,255,255,0.02);display:flex;flex-direction:column;gap:6px}
  .preset .name{font-weight:800;font-size:0.95rem}
  .preset .sub{font-size:0.78rem;color:var(--muted)}
  .preset.active{box-shadow:0 10px 30px var(--ring);outline:2px solid rgba(255,255,255,0.02)}

  /* main timer */
  .main{display:flex;flex-direction:column;align-items:center;gap:14px;padding:18px;border-radius:20px}
  .timer-outer{width:86vw;max-width:320px;height:86vw;max-height:320px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 30% 20%, rgba(255,255,255,0.02), rgba(255,255,255,0.01));box-shadow:var(--soft-shadow);position:relative}
  .timer-inner{width:74%;height:74%;border-radius:50%;display:grid;place-items:center;background:linear-gradient(180deg,rgba(255,255,255,0.01),rgba(255,255,255,0.02));border:1px dashed rgba(255,255,255,0.02)}
  #time{font-size:2.8rem;font-weight:800;letter-spacing:0.02em}
  .phase-pill{position:absolute;top:12px;left:12px;padding:6px 10px;border-radius:999px;background:var(--ring);color:var(--accent);font-weight:800;font-size:0.78rem}

  /* controls */
  .controls{display:flex;gap:12px;align-items:center;justify-content:center}
  .btn{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;border:none;background:var(--card);box-shadow:var(--soft-shadow);cursor:pointer;color:var(--ink);font-weight:800}
  .btn.primary{width:92px;height:92px;background:linear-gradient(180deg,var(--accent),color-mix(in srgb,var(--accent) 70%, black 10%));color:#fff;font-size:1.05rem}
  .small{font-size:0.82rem;color:var(--muted)}

  /* minimal (distraction free) */
  .minimal .card:not(.main){display:none}
  .minimal .header{display:none}
  .home-floating{position:fixed;left:16px;top:16px;z-index:70;display:none}
  .home-floating.show{display:grid}

  /* footer */
  footer{display:flex;justify-content:center;color:var(--muted);font-size:0.78rem;padding:6px 0}

  /* responsive tweaks */
  @media (max-width:420px){
    .preset .name{font-size:0.9rem}
    #time{font-size:2.2rem}
    .btn.primary{width:80px;height:80px}
  }
</style>
</head>
<body data-theme="dark">
  <!-- Splash -->
  <div id="splash" class="splash" role="dialog" aria-modal="true">
    <div class="splash-card" role="document" aria-labelledby="app-title">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 64 64" width="56" height="56" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M8 40c8-12 16-12 24 0s16 12 24 0" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="32" cy="20" r="6" fill="white" opacity="0.95"/>
        </svg>
      </div>
      <h1 id="app-title" style="margin:0;font-size:1.15rem">Ultradian</h1>
      <p style="margin:0;color:var(--muted)">Your time to focus</p>
      <button id="enter" class="enter">Open</button>
    </div>
  </div>

  <div class="wrap" id="app" aria-hidden="true">
    <header class="header card">
      <div class="brand">
        <h1 style="margin:0;font-size:1rem">Ultradian</h1>
        <p style="margin:0;font-size:0.78rem;color:var(--muted)">Reset your rhythm</p>
      </div>
      <div class="top-actions">
        <div id="total" class="small">0 min</div>
        <button id="themeToggle" class="icon-btn" title="Toggle theme" aria-pressed="false" aria-label="Toggle theme">☼</button>
        <button id="minimalToggle" class="icon-btn" title="Distraction free" aria-pressed="false" aria-label="Distraction free">•</button>
      </div>
    </header>

    <section class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="small">Paces</div>
        <div id="ambientLabel" class="small">Ambient</div>
      </div>
      <div class="presets" id="presets">
        <button class="preset" data-focus="10" data-break="5" aria-label="Low — Executive Warm‑Up">
          <div class="name">Low</div>
          <div class="sub">Executive Warm‑Up · 10 / 5</div>
        </button>
        <button class="preset active" data-focus="25" data-break="5" aria-label="Medium — Pomodoro Cycle">
          <div class="name">Medium</div>
          <div class="sub">Pomodoro Cycle · 25 / 5</div>
        </button>
        <button class="preset" data-focus="45" data-break="15" aria-label="High — Cognitive Load Cycle">
          <div class="name">High</div>
          <div class="sub">Cognitive Load Cycle · 45 / 15</div>
        </button>
        <button class="preset" data-focus="90" data-break="30" aria-label="Deep — Ultradian Rhythm">
          <div class="name">Deep</div>
          <div class="sub">Ultradian Rhythm · 90 / 30</div>
        </button>
      </div>
    </section>

    <section class="card main" id="main">
      <div class="main">
        <div class="timer-outer" role="timer" aria-live="polite">
          <div class="phase-pill" id="phase">Focus</div>
          <div class="timer-inner">
            <div id="time">25:00</div>
          </div>
        </div>

        <div class="controls" id="controls">
          <button id="start" class="btn primary" aria-label="Start">Start</button>
          <button id="pause" class="btn" aria-label="Pause">Pause</button>
          <button id="reset" class="btn" aria-label="Reset">⟲</button>
        </div>

        <div style="display:flex;gap:12px;align-items:center">
          <div class="small">Ambient</div>
          <button id="ambient" class="btn" aria-label="Toggle ambient">♪</button>
        </div>
      </div>
    </section>

    <footer class="small" style="text-align:center">Ultradian — Your Time to Focus</footer>
  </div>

  <button id="homeBtn" class="icon-btn home-floating" title="Home" aria-label="Home">⌂</button>

<script>
  // state
  let focus = 25, rest = 5, isFocus = true, remaining = focus*60, timer = null;
  let total = Number(localStorage.getItem('ultr_total')||0);
  let theme = localStorage.getItem('ultr_theme') || 'dark';

  // elements
  const splash = document.getElementById('splash'), app = document.getElementById('app');
  const timeEl = document.getElementById('time'), phaseEl = document.getElementById('phase'), totalEl = document.getElementById('total');
  const presets = document.getElementById('presets'), startBtn = document.getElementById('start'), pauseBtn = document.getElementById('pause'), resetBtn = document.getElementById('reset');
  const minimalToggle = document.getElementById('minimalToggle'), homeBtn = document.getElementById('homeBtn');
  const themeToggle = document.getElementById('themeToggle'), ambientBtn = document.getElementById('ambient'), ambientLabel = document.getElementById('ambientLabel');

  // theme
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme', t==='light' ? 'light' : 'dark');
    themeToggle.textContent = t==='light' ? '☾' : '☼';
    themeToggle.setAttribute('aria-pressed', String(t==='light'));
    localStorage.setItem('ultr_theme', t);
  }
  applyTheme(theme);

  // splash
  document.getElementById('enter').addEventListener('click', ()=>{ splash.style.display='none'; app.setAttribute('aria-hidden','false'); });

  // presets
  presets.querySelectorAll('.preset').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      presets.querySelectorAll('.preset').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      focus = Number(btn.dataset.focus); rest = Number(btn.dataset.break);
      remaining = focus*60; isFocus=true; updateDisplay(); updatePhase();
      stopTimer();
    });
  });

  // controls
  startBtn.addEventListener('click', startTimer);
  pauseBtn.addEventListener('click', stopTimer);
  resetBtn.addEventListener('click', ()=>{ stopTimer(); isFocus=true; remaining = focus*60; updateDisplay(); updatePhase(); });

  // minimal toggle
  minimalToggle.addEventListener('click', ()=>{
    const on = app.classList.toggle('minimal');
    minimalToggle.setAttribute('aria-pressed', String(on));
    homeBtn.classList.toggle('show', on);
  });

  // home button
  homeBtn.addEventListener('click', ()=>{
    app.classList.remove('minimal');
    minimalToggle.setAttribute('aria-pressed','false');
    homeBtn.classList.remove('show');
  });

  // theme toggle
  themeToggle.addEventListener('click', ()=>{
    theme = (theme === 'light') ? 'dark' : 'light';
    applyTheme(theme);
  });

  // ambient placeholder
  let ambientOn=false;
  ambientBtn.addEventListener('click', ()=>{
    ambientOn = !ambientOn;
    ambientBtn.style.background = ambientOn ? 'linear-gradient(180deg,var(--accent),rgba(0,0,0,0.12))' : '';
    ambientBtn.style.color = ambientOn ? '#fff' : '';
    ambientLabel.textContent = ambientOn ? 'Ambient • On' : 'Ambient';
    // hook: attach gentle offline audio here
  });

  // timer logic
  function updateDisplay(){ const m=Math.floor(remaining/60), s=remaining%60; timeEl.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0'); }
  function updatePhase(){ phaseEl.textContent = isFocus ? 'Focus' : 'Rest'; }
  function tick(){
    remaining--;
    if(isFocus){ total++; localStorage.setItem('ultr_total', total); totalEl.textContent = Math.floor(total/60) + ' min'; }
    updateDisplay();
    if(remaining<=0){
      stopTimer();
      isFocus = !isFocus;
      remaining = (isFocus ? focus : rest) * 60;
      updatePhase();
      setTimeout(()=> startTimer(), 700);
    }
  }
  function startTimer(){ if(timer) return; timer = setInterval(tick,1000); app.classList.add('minimal'); minimalToggle.setAttribute('aria-pressed','true'); homeBtn.classList.add('show'); }
  function stopTimer(){ clearInterval(timer); timer=null; }

  // init
  updateDisplay(); updatePhase(); totalEl.textContent = Math.floor(total/60) + ' min';

  // keyboard shortcuts
  document.addEventListener('keydown', (e)=>{
    if(e.key===' '){ e.preventDefault(); timer ? stopTimer() : startTimer(); }
    if(e.key==='r'){ resetBtn.click(); }
    if(e.key==='h'){ homeBtn.click(); }
    if(e.key==='t'){ themeToggle.click(); }
  });
</script>
</body>
</html>
