<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultradian — Your Time to Focus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #07070a;
            --bg-surface: #0f1114;
            --text-primary: #e9eefc;
            --text-muted: #9aa6c7;
            --accent: #6f8bff;
            --accent-dark: #5575dd;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app {
            width: 100%;
            height: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            position: relative;
        }

        /* SCREENS */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* SPLASH SCREEN */
        .splash-screen {
            padding: 40px 24px;
            text-align: center;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-surface) 100%);
        }

        .splash-logo {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .splash-tagline {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .splash-cta {
            display: inline-block;
            padding: 16px 32px;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(111, 139, 255, 0.3);
            min-width: 48px;
            min-height: 48px;
        }

        .splash-cta:hover {
            background: var(--accent-dark);
            box-shadow: 0 12px 32px rgba(111, 139, 255, 0.4);
            transform: translateY(-2px);
        }

        .splash-cta:active {
            transform: translateY(0);
        }

        /* PRESETS SCREEN */
        .presets-screen {
            padding: 60px 24px 40px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .presets-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .presets-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .presets-subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        .presets-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            max-width: 400px;
            margin: 0 auto;
        }

        .preset-card {
            padding: 20px;
            background: var(--bg-surface);
            border: 1px solid rgba(111, 139, 255, 0.1);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 80px;
            position: relative;
            overflow: hidden;
        }

        .preset-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .preset-card:hover {
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .preset-card:hover::before {
            opacity: 0.05;
        }

        .preset-card.selected {
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--bg-surface), rgba(111, 139, 255, 0.08));
        }

        .preset-info h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .preset-info p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .preset-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 60px;
        }

        .preset-badge-time {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        .preset-badge-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* TIMER SCREEN */
        .timer-screen {
            padding: 40px 24px;
            position: relative;
        }

        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 24px;
        }

        .timer-phase {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .timer-phase.focus {
            color: var(--accent);
        }

        .timer-ring-wrapper {
            width: 240px;
            height: 240px;
            position: relative;
            margin: 20px 0;
        }

        .timer-ring {
            width: 100%;
            height: 100%;
        }

        .timer-circle-bg {
            fill: none;
            stroke: var(--bg-surface);
            stroke-width: 8;
        }

        .timer-circle-progress {
            fill: none;
            stroke: var(--accent);
            stroke-width: 8;
            stroke-linecap: round;
            transform-origin: 50% 50%;
            transform: rotate(-90deg);
            filter: drop-shadow(0 0 8px rgba(111, 139, 255, 0.4));
            transition: stroke-dashoffset 0.05s linear;
        }

        .timer-display {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .timer-time {
            font-size: 56px;
            font-weight: 300;
            letter-spacing: -1px;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .timer-controls {
            display: flex;
            gap: 16px;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        .timer-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 22px;
            min-width: 48px;
            min-height: 48px;
        }

        .timer-btn-primary {
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: var(--bg-primary);
            box-shadow: 0 8px 24px rgba(111, 139, 255, 0.3);
        }

        .timer-btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 32px rgba(111, 139, 255, 0.4);
        }

        .timer-btn-primary:active {
            transform: scale(0.98);
        }

        .timer-btn-secondary {
            background: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid rgba(111, 139, 255, 0.1);
        }

        .timer-btn-secondary:hover {
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .timer-btn-secondary:active {
            transform: scale(0.98);
        }

        /* HOME BUTTON (minimal mode) */
        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-surface);
            border: 1px solid rgba(111, 139, 255, 0.1);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .home-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .home-btn:hover {
            border-color: var(--accent);
            transform: scale(1.1);
        }

        .home-btn:active {
            transform: scale(0.95);
        }

        /* ICONS */
        .icon {
            display: inline-block;
            width: 1em;
            height: 1em;
            vertical-align: middle;
        }

        /* ACCESSIBILITY */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* RESPONSIVE */
        @media (max-height: 600px) {
            .splash-screen {
                padding: 30px 24px;
            }
            .presets-screen {
                padding: 40px 24px 30px;
            }
            .presets-header {
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- SPLASH SCREEN -->
        <div class="screen splash-screen active">
            <div>
                <div class="splash-logo">Ultradian</div>
                <p class="splash-tagline">Your Time to Focus</p>
            </div>
            <button class="splash-cta" onclick="app.goToPresets()">Begin</button>
        </div>

        <!-- PRESETS SCREEN -->
        <div class="screen presets-screen">
            <div class="presets-header">
                <h1 class="presets-title">Choose Your Pace</h1>
                <p class="presets-subtitle">Natural cycles for sustained focus</p>
            </div>
            <div class="presets-grid">
                <div class="preset-card" onclick="app.selectPreset('low')" role="button" tabindex="0">
                    <div class="preset-info">
                        <h3>Executive Warm-Up</h3>
                        <p>Quick focus burst</p>
                    </div>
                    <div class="preset-badge">
                        <div class="preset-badge-time">10m</div>
                        <div class="preset-badge-label">Focus</div>
                    </div>
                </div>

                <div class="preset-card" onclick="app.selectPreset('medium')" role="button" tabindex="0">
                    <div class="preset-info">
                        <h3>Pomodoro Cycle</h3>
                        <p>Classic focus block</p>
                    </div>
                    <div class="preset-badge">
                        <div class="preset-badge-time">25m</div>
                        <div class="preset-badge-label">Focus</div>
                    </div>
                </div>

                <div class="preset-card" onclick="app.selectPreset('high')" role="button" tabindex="0">
                    <div class="preset-info">
                        <h3>Cognitive Load Cycle</h3>
                        <p>Deep work session</p>
                    </div>
                    <div class="preset-badge">
                        <div class="preset-badge-time">45m</div>
                        <div class="preset-badge-label">Focus</div>
                    </div>
                </div>

                <div class="preset-card" onclick="app.selectPreset('deep')" role="button" tabindex="0">
                    <div class="preset-info">
                        <h3>Ultradian Rhythm</h3>
                        <p>Complete cycle</p>
                    </div>
                    <div class="preset-badge">
                        <div class="preset-badge-time">90m</div>
                        <div class="preset-badge-label">Focus</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- TIMER SCREEN -->
        <div class="screen timer-screen">
            <button class="home-btn" onclick="app.returnToPresets()" title="Return to presets" aria-label="Return to presets">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </button>

            <div class="timer-container">
                <div class="timer-phase" id="phase-label">Focus</div>

                <div class="timer-ring-wrapper">
                    <svg class="timer-ring" viewBox="0 0 120 120">
                        <circle class="timer-circle-bg" cx="60" cy="60" r="54"></circle>
                        <circle class="timer-circle-progress" id="progress-ring" cx="60" cy="60" r="54"></circle>
                    </svg>
                    <div class="timer-display">
                        <div class="timer-time" id="timer-display" role="timer" aria-live="polite" aria-atomic="true">00:00</div>
                    </div>
                </div>

                <div class="timer-controls">
                    <button class="timer-btn timer-btn-secondary" id="reset-btn" onclick="app.reset()" title="Reset" aria-label="Reset timer">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <path d="M20.49 15a9 9 0 1 1-2-8.83"></path>
                        </svg>
                    </button>

                    <button class="timer-btn timer-btn-primary" id="play-btn" onclick="app.togglePlay()" title="Start" aria-label="Start timer">
                        <svg viewBox="0 0 24 24" fill="currentColor" class="icon">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                    </button>

                    <button class="timer-btn timer-btn-secondary" id="menu-btn" style="visibility: hidden;"></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const app = {
            presets: {
                low: { focus: 10 * 60, rest: 5 * 60 },
                medium: { focus: 25 * 60, rest: 5 * 60 },
                high: { focus: 45 * 60, rest: 15 * 60 },
                deep: { focus: 90 * 60, rest: 30 * 60 }
            },

            state: {
                screen: 'splash',
                currentPreset: null,
                isRunning: false,
                isResting: false,
                totalSeconds: 0,
                remainingSeconds: 0,
                totalFocusTime: 0
            },

            init() {
                this.loadState();
                this.setupRing();
                this.setupKeyboard();
                this.render();
            },

            loadState() {
                const saved = localStorage.getItem('ultr_state');
                if (saved) {
                    const savedState = JSON.parse(saved);
                    // Don't restore the screen state - always start at splash
                    delete savedState.screen;
                    this.state = { ...this.state, ...savedState };
                }
                // Always start at splash screen
                this.state.screen = 'splash';
            },

            saveState() {
                localStorage.setItem('ultr_state', JSON.stringify(this.state));
            },

            setupRing() {
                const ring = document.getElementById('progress-ring');
                this.ringRadius = ring.r.baseVal.value;
                this.ringCircumference = 2 * Math.PI * this.ringRadius;
                ring.style.strokeDasharray = `${this.ringCircumference}`;
                ring.style.strokeDashoffset = `${this.ringCircumference}`;
            },

            updateRingProgress() {
                const ring = document.getElementById('progress-ring');
                const progress = this.state.remainingSeconds / this.state.totalSeconds;
                const offset = this.ringCircumference * (1 - progress);
                ring.style.strokeDashoffset = offset;
            },

            goToPresets() {
                this.state.screen = 'presets';
                this.render();
            },

            selectPreset(preset) {
                this.state.currentPreset = preset;
                const presetData = this.presets[preset];
                this.state.totalSeconds = presetData.focus;
                this.state.remainingSeconds = presetData.focus;
                this.state.isRunning = false;
                this.state.isResting = false;
                this.state.screen = 'timer';
                this.saveState();
                this.render();
                this.updateRingProgress();
            },

            togglePlay() {
                this.state.isRunning = !this.state.isRunning;
                this.saveState();
                this.render();
                if (this.state.isRunning) {
                    this.startTimer();
                }
            },

            reset() {
                if (this.state.currentPreset) {
                    const presetData = this.presets[this.state.currentPreset];
                    this.state.totalSeconds = this.state.isResting ? presetData.rest : presetData.focus;
                    this.state.remainingSeconds = this.state.totalSeconds;
                    this.state.isRunning = false;
                    this.saveState();
                    this.render();
                    this.updateRingProgress();
                }
            },

            returnToPresets() {
                this.state.screen = 'presets';
                this.render();
            },

            startTimer() {
                let lastSecond = Math.floor(Date.now() / 1000);
                
                const step = () => {
                    if (!this.state.isRunning) return;

                    const currentSecond = Math.floor(Date.now() / 1000);
                    
                    // Only decrement once per actual second
                    if (currentSecond > lastSecond) {
                        this.state.remainingSeconds--;
                        if (!this.state.isResting) this.state.totalFocusTime++;
                        lastSecond = currentSecond;

                        if (this.state.remainingSeconds <= 0) {
                            this.transitionPhase();
                            return;
                        } else {
                            this.updateDisplay();
                            this.updateRingProgress();
                            this.saveState();
                        }
                    }
                    
                    if (this.state.isRunning) {
                        requestAnimationFrame(step);
                    }
                };
                requestAnimationFrame(step);
            },

            transitionPhase() {
                const presetData = this.presets[this.state.currentPreset];
                this.state.isResting = !this.state.isResting;

                if (this.state.isResting) {
                    this.state.totalSeconds = presetData.rest;
                    this.state.remainingSeconds = presetData.rest;
                } else {
                    this.state.totalSeconds = presetData.focus;
                    this.state.remainingSeconds = presetData.focus;
                }

                this.updateDisplay();
                this.updateRingProgress();
                this.saveState();
                setTimeout(() => this.startTimer(), 500);
            },

            updateDisplay() {
                const mins = Math.floor(this.state.remainingSeconds / 60);
                const secs = this.state.remainingSeconds % 60;
                document.getElementById('timer-display').textContent = 
                    `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            },

            render() {
                // Update screens
                document.querySelectorAll('.screen').forEach(screen => {
                    screen.classList.remove('active');
                });
                document.querySelector(`.${this.state.screen}-screen`).classList.add('active');

                // Update presets UI
                if (this.state.screen === 'presets') {
                    document.querySelectorAll('.preset-card').forEach(card => {
                        card.classList.remove('selected');
                    });
                    if (this.state.currentPreset) {
                        const presets = ['low', 'medium', 'high', 'deep'];
                        const index = presets.indexOf(this.state.currentPreset);
                        document.querySelectorAll('.preset-card')[index].classList.add('selected');
                    }
                }

                // Update timer UI
                if (this.state.screen === 'timer') {
                    // Update phase
                    const phaseLabel = document.getElementById('phase-label');
                    phaseLabel.textContent = this.state.isResting ? 'Rest' : 'Focus';
                    phaseLabel.className = 'timer-phase' + (this.state.isResting ? '' : ' focus');

                    // Update play button
                    const playBtn = document.getElementById('play-btn');
                    playBtn.innerHTML = this.state.isRunning ? 
                        '<svg viewBox="0 0 24 24" fill="currentColor" class="icon"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>' :
                        '<svg viewBox="0 0 24 24" fill="currentColor" class="icon"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
                    
                    playBtn.title = this.state.isRunning ? 'Pause' : 'Start';
                    playBtn.setAttribute('aria-label', this.state.isRunning ? 'Pause timer' : 'Start timer');

                    // Home button
                    const homeBtn = document.querySelector('.home-btn');
                    homeBtn.classList.toggle('visible', this.state.isRunning);

                    this.updateDisplay();
                    this.updateRingProgress();
                }
            },

            setupKeyboard() {
                document.addEventListener('keydown', (e) => {
                    if (this.state.screen === 'timer') {
                        if (e.code === 'Space') {
                            e.preventDefault();
                            this.togglePlay();
                        } else if (e.code === 'KeyR') {
                            e.preventDefault();
                            this.reset();
                        } else if (e.code === 'KeyH') {
                            e.preventDefault();
                            this.returnToPresets();
                        }
                    }
                });

                // Preset selection with keyboard
                document.addEventListener('keydown', (e) => {
                    if (this.state.screen === 'presets' && /^[1-4]$/.test(e.key)) {
                        const presets = ['low', 'medium', 'high', 'deep'];
                        this.selectPreset(presets[parseInt(e.key) - 1]);
                    }
                });
            }
        };

        app.init();
    </script>
</body>
</html>
