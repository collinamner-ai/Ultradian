<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ultradian — Your Time to Focus</title>
<style>
  :root{
    --bg:#0b0b0c;
    --surface:#0f1113;
    --text:#e6eefc;
    --muted:#9aa6c7;
    --accent:#6f8bff;
    --ring: rgba(111,139,255,0.12);
    --radius:28px;
    --shadow: 0 18px 40px rgba(2,6,23,0.6);
    --tap:48px;
  }
  :root[data-theme="light"]{
    --bg:#f5f7fb;
    --surface:#ffffff;
    --text:#0f1724;
    --muted:#6b7280;
    --accent:#3a5fcd;
    --ring: rgba(58,95,205,0.12);
    --shadow: 0 18px 40px rgba(15,23,42,0.06);
  }

  *{box-sizing:border-box;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;}
  html,body{height:100%;margin:0;background:radial-gradient(circle at 10% 10%, rgba(111,139,255,0.03), var(--bg) 40%);color:var(--text);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:520px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column;gap:12px;}

  /* Header */
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 4px}
  .brand{display:flex;flex-direction:column}
  .brand h1{margin:0;font-size:1rem;letter-spacing:0.01em}
  .brand p{margin:0;font-size:0.78rem;color:var(--muted)}

  .icon-btn{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;border:none;background:var(--surface);box-shadow:var(--shadow);cursor:pointer;color:var(--text);font-weight:700}
  .icon-btn:active{transform:scale(0.98)}

  /* Presets (compact) */
  .presets-wrap{padding:8px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,0.01),rgba(255,255,255,0.02));box-shadow:var(--shadow)}
  .presets{display:flex;gap:8px;flex-wrap:wrap;justify-content:space-between}
  .preset{flex:1 1 48%;min-width:44%;padding:12px;border-radius:12px;background:transparent;border:1px solid rgba(255,255,255,0.02);cursor:pointer;display:flex;flex-direction:column;gap:6px;align-items:flex-start}
  .preset .name{font-weight:800;font-size:0.95rem}
  .preset .sub{font-size:0.78rem;color:var(--muted)}
  .preset.active{box-shadow:0 10px 30px var(--ring);outline:2px solid rgba(255,255,255,0.02)}

  /* Timer (dominant) */
  .main{display:flex;flex-direction:column;align-items:center;gap:14px;padding:6px}
  .timer-outer{width:86vw;max-width:360px;height:86vw;max-height:360px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 30% 20%, rgba(255,255,255,0.02), rgba(255,255,255,0.01));box-shadow:var(--shadow);position:relative}
  .timer-inner{width:72%;height:72%;border-radius:50%;display:grid;place-items:center;background:linear-gradient(180deg,rgba(255,255,255,0.01),rgba(255,255,255,0.02));border:1px dashed rgba(255,255,255,0.02)}
  #time{font-size:2.8rem;font-weight:800;letter-spacing:0.02em}
  .phase-pill{position:absolute;top:12px;left:12px;padding:6px 10px;border-radius:999px;background:var(--ring);color:var(--accent);font-weight:800;font-size:0.78rem}

  /* Controls (large circular) */
  .controls{display:flex;gap:12px;align-items:center;justify-content:center}
  .btn{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;border:none;background:var(--surface);box-shadow:var(--shadow);cursor:pointer;color:var(--text);font-weight:800}
  .btn.primary{width:92px;height:92px;background:linear-gradient(180deg,var(--accent),color-mix(in srgb,var(--accent) 70%, black 10%));color:#fff;font-size:1.05rem}
  .btn:active{transform:scale(0.98)}

  /* Floating home (visible in minimal) */
  .home-floating{position:fixed;left:14px;top:14px;z-index:80;display:none}
  .home-floating.show{display:grid}

  /* Minimal mode hides extras but keeps header icon visible via home */
  .minimal .presets-wrap{display:none}
  .minimal header{display:none}
  .minimal footer{display:none}

  footer{display:flex;justify-content:center;color:var(--muted);font-size:0.78rem;padding:6px 0}

  /* Accessibility & responsive */
  @media (max-width:420px){
    #time{font-size:2.2rem}
    .btn.primary{width:80px;height:80px}
    .preset{padding:10px}
  }
</style>
</head>
<body>
  <div class="wrap" id="app" aria-live="polite">
    <header>
      <div class="brand" aria-hidden="false">
        <h1>Ultradian</h1>
        <p>Reset your rhythm</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div id="total" style="font-size:0.9rem;color:var(--muted)">0 min</div>
        <button id="themeBtn" class="icon-btn" aria-label="Toggle theme">☼</button>
        <button id="minimalBtn" class="icon-btn" aria-label="Distraction free">•</button>
      </div>
    </header>

    <section class="presets-wrap card" aria-label="Paces">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:0.85rem;color:var(--muted)">Paces</div>
        <div id="ambientLabel" style="font-size:0.82rem;color:var(--muted)">Ambient</div>
      </div>
      <div class="presets" id="presets">
        <button class="preset" data-focus="10" data-break="5" aria-label="Low — Executive Warm‑Up">
          <div class="name">Low</div>
          <div class="sub">Executive Warm‑Up · 10 / 5</div>
        </button>
        <button class="preset active" data-focus="25" data-break="5" aria-label="Medium — Pomodoro Cycle">
          <div class="name">Medium</div>
          <div class="sub">Pomodoro Cycle · 25 / 5</div>
        </button>
        <button class="preset" data-focus="45" data-break="15" aria-label="High — Cognitive Load Cycle">
          <div class="name">High</div>
          <div class="sub">Cognitive Load Cycle · 45 / 15</div>
        </button>
        <button class="preset" data-focus="90" data-break="30" aria-label="Deep — Ultradian Rhythm">
          <div class="name">Deep</div>
          <div class="sub">Ultradian Rhythm · 90 / 30</div>
        </button>
      </div>
    </section>

    <main class="main" role="main" aria-label="Timer">
      <div class="timer-outer" role="timer" aria-live="polite" aria-atomic="true">
        <div class="phase-pill" id="phase">Focus</div>
        <div class="timer-inner">
          <div id="time">25:00</div>
        </div>
      </div>

      <div class="controls" id="controls">
        <button id="start" class="btn primary" aria-label="Start">Start</button>
        <button id="pause" class="btn" aria-label="Pause">Pause</button>
        <button id="reset" class="btn" aria-label="Reset">⟲</button>
      </div>

      <div style="display:flex;gap:12px;align-items:center">
        <div style="font-size:0.82rem;color:var(--muted)">Ambient</div>
        <button id="ambient" class="btn" aria-label="Toggle ambient">♪</button>
      </div>
    </main>

    <footer style="text-align:center;color:var(--muted);font-size:0.78rem">Ultradian — Your Time to Focus</footer>
  </div>

  <button id="homeBtn" class="icon-btn home-floating" title="Home" aria-label="Home">⌂</button>

<script>
  // state
  let focus = 25, rest = 5, isFocus = true, remaining = focus*60, timer = null;
  let total = Number(localStorage.getItem('ultr_total')||0);
  let theme = localStorage.getItem('ultr_theme') || 'dark';

  // elements
  const app = document.getElementById('app');
  const timeEl = document.getElementById('time'), phaseEl = document.getElementById('phase'), totalEl = document.getElementById('total');
  const presets = document.getElementById('presets'), startBtn = document.getElementById('start'), pauseBtn = document.getElementById('pause'), resetBtn = document.getElementById('reset');
  const minimalBtn = document.getElementById('minimalBtn'), homeBtn = document.getElementById('homeBtn');
  const themeBtn = document.getElementById('themeBtn'), ambientBtn = document.getElementById('ambient'), ambientLabel = document.getElementById('ambientLabel');

  // apply theme
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme', t==='light' ? 'light' : 'dark');
    themeBtn.textContent = t==='light' ? '☾' : '☼';
    localStorage.setItem('ultr_theme', t);
  }
  applyTheme(theme);

  // presets
  presets.querySelectorAll('.preset').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      presets.querySelectorAll('.preset').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      focus = Number(btn.dataset.focus); rest = Number(btn.dataset.break);
      remaining = focus*60; isFocus=true; updateDisplay(); updatePhase();
      stopTimer();
    });
  });

  // controls
  startBtn.addEventListener('click', startTimer);
  pauseBtn.addEventListener('click', stopTimer);
  resetBtn.addEventListener('click', ()=>{ stopTimer(); isFocus=true; remaining = focus*60; updateDisplay(); updatePhase(); });

  // minimal toggle
  minimalBtn.addEventListener('click', ()=>{
    const on = app.classList.toggle('minimal');
    minimalBtn.setAttribute('aria-pressed', String(on));
    homeBtn.classList.toggle('show', on);
  });

  // home button
  homeBtn.addEventListener('click', ()=>{
    app.classList.remove('minimal');
    minimalBtn.setAttribute('aria-pressed','false');
    homeBtn.classList.remove('show');
  });

  // theme toggle
  themeBtn.addEventListener('click', ()=>{
    theme = (theme === 'light') ? 'dark' : 'light';
    applyTheme(theme);
  });

  // ambient placeholder
  let ambientOn=false;
  ambientBtn.addEventListener('click', ()=>{
    ambientOn = !ambientOn;
    ambientBtn.style.background = ambientOn ? 'linear-gradient(180deg,var(--accent),rgba(0,0,0,0.12))' : '';
    ambientBtn.style.color = ambientOn ? '#fff' : '';
    ambientLabel.textContent = ambientOn ? 'Ambient • On' : 'Ambient';
    // hook: attach gentle offline audio here
  });

  // timer logic
  function updateDisplay(){ const m=Math.floor(remaining/60), s=remaining%60; timeEl.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0'); }
  function updatePhase(){ phaseEl.textContent = isFocus ? 'Focus' : 'Rest'; }
  function tick(){
    remaining--;
    if(isFocus){ total++; localStorage.setItem('ultr_total', total); totalEl.textContent = Math.floor(total/60) + ' min'; }
    updateDisplay();
    if(remaining<=0){
      stopTimer();
      isFocus = !isFocus;
      remaining = (isFocus ? focus : rest) * 60;
      updatePhase();
      setTimeout(()=> startTimer(), 700);
    }
  }
  function startTimer(){ if(timer) return; timer = setInterval(tick,1000); app.classList.add('minimal'); minimalBtn.setAttribute('aria-pressed','true'); homeBtn.classList.add('show'); }
  function stopTimer(){ clearInterval(timer); timer=null; }

  // init
  updateDisplay(); updatePhase(); totalEl.textContent = Math.floor(total/60) + ' min';

  // keyboard shortcuts
  document.addEventListener('keydown', (e)=>{
    if(e.key===' '){ e.preventDefault(); timer ? stopTimer() : startTimer(); }
    if(e.key==='r'){ resetBtn.click(); }
    if(e.key==='h'){ homeBtn.click(); }
    if(e.key==='t'){ themeBtn.click(); }
  });
</script>
</body>
</html>
