<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ultradian — Your Time to Focus</title>
<style>
  :root{
    --bg: #f5f7fb;
    --card: #ffffff;
    --ink: #0f1724;
    --muted: #6b7280;
    --accent-1: #3a5fcd;
    --accent-2: #4cc7c1;
    --glass: rgba(255,255,255,0.6);
    --soft-1: rgba(58,95,205,0.12);
    --radius: 999px;
    --shadow-1: 0 18px 40px rgba(15,23,42,0.06);
  }
  :root[data-theme="dark"]{
    --bg: #0b1020;
    --card: linear-gradient(180deg,#071026,#0b1224);
    --ink: #e6eefc;
    --muted: #9aa6c7;
    --accent-1: #6f8bff;
    --accent-2: #5fe0d1;
    --glass: rgba(255,255,255,0.03);
    --soft-1: rgba(111,139,255,0.12);
    --shadow-1: 0 18px 40px rgba(2,6,23,0.6);
  }

  *{box-sizing:border-box;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;}
  html,body{height:100%;margin:0;background:
    radial-gradient(circle at 10% 10%, rgba(232,238,255,0.6) 0%, var(--bg) 40%, var(--bg) 100%);
    color:var(--ink);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}

  .wrap{max-width:520px;margin:0 auto;padding:20px;display:flex;flex-direction:column;min-height:100vh;gap:18px;}
  /* Splash */
  .splash{height:100vh;position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:40;background:linear-gradient(180deg, rgba(255,255,255,0.6), rgba(250,250,252,0.4));backdrop-filter:blur(6px);}
  .splash-card{width:86%;max-width:420px;padding:28px;border-radius:20px;background:linear-gradient(180deg,var(--card),#f7fbff);box-shadow:var(--shadow-1);display:flex;flex-direction:column;align-items:center;gap:18px;}
  .logo{width:84px;height:84px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(from 180deg at 50% 50%, var(--accent-1), var(--accent-2));box-shadow:0 8px 20px rgba(58,95,205,0.12);position:relative;overflow:hidden;}
  .logo svg{width:56px;height:56px;filter:drop-shadow(0 6px 18px rgba(58,95,205,0.12));}
  .splash h1{margin:0;font-size:1.25rem;letter-spacing:0.01em;}
  .splash p{margin:0;color:var(--muted);font-size:0.95rem;}
  .enter-btn{margin-top:6px;padding:10px 18px;border-radius:999px;border:none;background:linear-gradient(180deg,var(--accent-1),#2d4fb8);color:#fff;font-weight:600;cursor:pointer;box-shadow:0 8px 20px rgba(58,95,205,0.12);}

  /* Cards and layout */
  .card{background:var(--card);border-radius:20px;padding:14px;border:1px solid rgba(15,23,42,0.04);box-shadow:var(--shadow-1);}
  .top-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .title h2{margin:0;font-size:1.05rem;}
  .title p{margin:0;color:var(--muted);font-size:0.85rem;}

  /* Presets */
  .presets{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px;}
  .preset{background:linear-gradient(180deg, rgba(255,255,255,0.9), rgba(245,247,255,0.9));border-radius:14px;padding:12px;border:1px solid rgba(15,23,42,0.04);cursor:pointer;display:flex;flex-direction:column;gap:6px;align-items:flex-start;}
  .preset .name{font-weight:700;}
  .preset .sub{font-size:0.78rem;color:var(--muted);}
  .preset.active{outline:3px solid var(--soft-1);box-shadow:0 8px 18px rgba(58,95,205,0.06);border-color:rgba(58,95,205,0.12);}

  /* Timer */
  .center{display:flex;flex-direction:column;align-items:center;gap:14px;padding:18px;}
  .timer-ring{width:220px;height:220px;border-radius:50%;display:grid;place-items:center;background:
    radial-gradient(circle at 30% 20%, #ffffff 0%, #eef4ff 45%, #e6ecff 100%);box-shadow:var(--shadow-1);position:relative;}
  .timer-ring .inner{width:170px;height:170px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(180deg,#fff,#f7fbff);border:1px dashed rgba(15,23,42,0.06);}
  #time{font-size:2.6rem;font-weight:700;letter-spacing:0.02em;}
  .mode-pill{position:absolute;top:12px;left:12px;padding:6px 10px;border-radius:999px;background:var(--soft-1);color:var(--accent-1);font-weight:700;font-size:0.78rem;}

  /* Controls: round */
  .controls{display:flex;gap:12px;align-items:center;}
  .btn{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;border:none;background:var(--card);box-shadow:var(--shadow-1);cursor:pointer;font-weight:700;color:var(--ink);font-size:0.95rem;}
  .btn.primary{width:92px;height:92px;background:linear-gradient(180deg,var(--accent-1),#2d4fb8);color:#fff;font-size:1.05rem;box-shadow:0 18px 40px rgba(58,95,205,0.12);}
  .small{font-size:0.82rem;color:var(--muted);}

  /* Home & theme buttons */
  .top-actions{display:flex;gap:10px;align-items:center;}
  .icon-btn{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;border:none;background:var(--card);box-shadow:var(--shadow-1);cursor:pointer;color:var(--ink);}

  /* Minimal mode */
  .minimal .card:not(.main){display:none;}
  .minimal .presets{display:none;}
  .minimal .top-row{display:none;}
  .home-visible{position:fixed;left:18px;top:18px;z-index:60;}

  /* Animations */
  @keyframes pulse {0%{transform:scale(0.98);opacity:0.9}50%{transform:scale(1.03);opacity:1}100%{transform:scale(0.98);opacity:0.9}}
  .logo{animation:pulse 3.6s ease-in-out infinite;}
  .fade-in{animation:fadeIn 420ms ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* Responsive */
  @media (max-width:420px){
    .timer-ring{width:180px;height:180px}
    .timer-ring .inner{width:140px;height:140px}
    .btn.primary{width:80px;height:80px}
  }
</style>
</head>
<body>
  <!-- Splash -->
  <div id="splash" class="splash" role="dialog" aria-modal="true">
    <div class="splash-card fade-in" role="document" aria-labelledby="app-title">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M8 40c8-12 16-12 24 0s16 12 24 0" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="32" cy="20" r="6" fill="#fff" opacity="0.95"/>
        </svg>
      </div>
      <h1 id="app-title">Ultradian</h1>
      <p>Reset your rhythm</p>
      <button id="enter" class="enter-btn" aria-label="Open Ultradian">Open</button>
    </div>
  </div>

  <div class="wrap" id="app" aria-hidden="true">
    <!-- Header -->
    <div class="card top-row">
      <div class="title">
        <h2>Ultradian</h2>
        <p class="small">Your time to focus</p>
      </div>
      <div class="top-actions">
        <div id="total" class="small">0 min</div>
        <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-pressed="false">☼</button>
        <button id="minimal-toggle" class="icon-btn" title="Distraction free" aria-pressed="false">•</button>
      </div>
    </div>

    <!-- Presets -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="small">Choose pace</div>
        <div class="small" id="ambient-ind">Ambient</div>
      </div>
      <div class="presets" id="presets">
        <button class="preset" data-focus="10" data-break="5"><div class="name">Low</div><div class="sub">10 / 5</div></button>
        <button class="preset active" data-focus="25" data-break="5"><div class="name">Medium</div><div class="sub">25 / 5</div></button>
        <button class="preset" data-focus="45" data-break="15"><div class="name">High</div><div class="sub">45 / 15</div></button>
        <button class="preset" data-focus="90" data-break="30"><div class="name">Deep</div><div class="sub">90 / 30</div></button>
      </div>
    </div>

    <!-- Main Timer -->
    <div class="card main" id="mainCard">
      <div class="center">
        <div class="timer-ring" role="timer" aria-live="polite">
          <div class="mode-pill" id="phase">Focus</div>
          <div class="inner">
            <div id="time">25:00</div>
          </div>
        </div>

        <div class="controls" id="controls">
          <button id="start" class="btn primary" aria-label="Start">Start</button>
          <button id="pause" class="btn" aria-label="Pause">Pause</button>
          <button id="reset" class="btn" aria-label="Reset">⟲</button>
        </div>

        <div style="display:flex;gap:12px;align-items:center;">
          <div class="small">Ambient</div>
          <button id="ambient" class="btn" title="Toggle ambient">♪</button>
        </div>
      </div>
    </div>

    <footer class="small">Offline • No accounts</footer>
  </div>

  <!-- Home button (visible in minimal mode) -->
  <button id="homeBtn" class="icon-btn home-visible" title="Home" style="display:none;">⌂</button>

<script>
  // State
  let focus = 25, rest = 5, isFocus = true, remaining = focus*60, timer = null;
  let total = Number(localStorage.getItem('ultr_total')||0);
  let theme = localStorage.getItem('ultr_theme') || 'light';

  // Elements
  const splash = document.getElementById('splash'), app = document.getElementById('app');
  const timeEl = document.getElementById('time'), phaseEl = document.getElementById('phase'), totalEl = document.getElementById('total');
  const presets = document.getElementById('presets'), startBtn = document.getElementById('start'), pauseBtn = document.getElementById('pause'), resetBtn = document.getElementById('reset');
  const minimalToggle = document.getElementById('minimal-toggle'), homeBtn = document.getElementById('homeBtn');
  const themeToggle = document.getElementById('theme-toggle'), ambientBtn = document.getElementById('ambient'), ambientInd = document.getElementById('ambient-ind');

  // Apply saved theme
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme', t==='dark' ? 'dark' : 'light');
    themeToggle.textContent = t==='dark' ? '☾' : '☼';
    themeToggle.setAttribute('aria-pressed', String(t==='dark'));
    localStorage.setItem('ultr_theme', t);
  }
  applyTheme(theme);

  // Splash enter
  document.getElementById('enter').addEventListener('click', ()=>{
    splash.style.display='none';
    app.setAttribute('aria-hidden','false');
  });

  // Preset selection
  presets.querySelectorAll('.preset').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      presets.querySelectorAll('.preset').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      focus = Number(btn.dataset.focus); rest = Number(btn.dataset.break);
      remaining = focus*60; isFocus=true; updateDisplay(); updatePhase();
      stopTimer();
    });
  });

  // Controls
  startBtn.addEventListener('click', startTimer);
  pauseBtn.addEventListener('click', stopTimer);
  resetBtn.addEventListener('click', ()=>{
    stopTimer(); isFocus=true; remaining = focus*60; updateDisplay(); updatePhase();
  });

  // Minimal toggle: hides extras but keeps timer state
  minimalToggle.addEventListener('click', ()=>{
    const on = app.classList.toggle('minimal');
    minimalToggle.setAttribute('aria-pressed', String(on));
    // show home button when minimal
    homeBtn.style.display = on ? 'grid' : 'none';
  });

  // Home button: return to main menu while timer runs
  homeBtn.addEventListener('click', ()=>{
    app.classList.remove('minimal');
    minimalToggle.setAttribute('aria-pressed','false');
    homeBtn.style.display = 'none';
  });

  // Theme toggle
  themeToggle.addEventListener('click', ()=>{
    theme = (theme === 'dark') ? 'light' : 'dark';
    applyTheme(theme);
  });

  // Ambient placeholder
  let ambientOn=false;
  ambientBtn.addEventListener('click', ()=>{
    ambientOn = !ambientOn;
    ambientBtn.style.background = ambientOn ? 'linear-gradient(180deg,var(--accent-1),#2d4fb8)' : '';
    ambientBtn.style.color = ambientOn ? '#fff' : '';
    ambientInd.textContent = ambientOn ? 'Ambient • On' : 'Ambient';
    // Hook: start/stop gentle offline audio here
  });

  // Timer functions
  function updateDisplay(){
    const m = Math.floor(remaining/60), s = remaining%60;
    timeEl.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }
  function updatePhase(){ phaseEl.textContent = isFocus ? 'Focus' : 'Rest'; }
  function tick(){
    remaining--;
    if(isFocus){ total++; localStorage.setItem('ultr_total', total); totalEl.textContent = Math.floor(total/60) + ' min'; }
    updateDisplay();
    if(remaining<=0){
      stopTimer();
      isFocus = !isFocus;
      remaining = (isFocus ? focus : rest) * 60;
      updatePhase();
      setTimeout(()=>{ startTimer(); }, 700);
    }
  }
  function startTimer(){
    if(timer) return;
    timer = setInterval(tick,1000);
    // enter distraction free when started but keep home visible
    app.classList.add('minimal');
    minimalToggle.setAttribute('aria-pressed','true');
    homeBtn.style.display = 'grid';
  }
  function stopTimer(){ clearInterval(timer); timer=null; }

  // Init
  updateDisplay(); updatePhase(); totalEl.textContent = Math.floor(total/60) + ' min';

  // Accessibility: keyboard shortcuts
  document.addEventListener('keydown', (e)=>{
    if(e.key===' '){ e.preventDefault(); timer ? stopTimer() : startTimer(); }
    if(e.key==='r'){ resetBtn.click(); }
    if(e.key==='h'){ homeBtn.click(); }
    if(e.key==='t'){ themeToggle.click(); }
  });
</script>
</body>
</html>
